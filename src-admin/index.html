<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="shortcut icon" href="favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
		<meta name="theme-color" content="#000000" />
		<link rel="manifest" href="manifest.json" />
		<script>
			var script = document.createElement('script');
			window.registerSocketOnLoad = function (cb) {
				window.socketLoadedHandler = cb;
			};
			const parts = (window.location.search || '').replace(/^\?/, '').split('&');
			const query = {};
			parts.forEach(function (item) {
				const kv = item.split('=');
				query[decodeURIComponent(kv[0])] = kv[1] !== undefined ? decodeURIComponent(kv[1]) : true;
			});
			script.onload = function () {
				typeof window.socketLoadedHandler === 'function' && window.socketLoadedHandler();
			};
			script.src =
				window.location.port === '3000'
					? window.location.protocol +
						'//' +
						(query.host || window.location.hostname) +
						':' +
						(query.port || 8081) +
						'/lib/js/socket.io.js'
					: '../../lib/js/socket.io.js';
			document.head.appendChild(script);
		</script>
		<title>InfluxDB ProLogger</title>
	</head>
	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>
		<script type="module" src="src/index.tsx"></script>
	</body>
</html>
