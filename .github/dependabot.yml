version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "**/*"
    schedule:
      interval: monthly
    open-pull-requests-limit: 20
    assignees:
      - simpros
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 20
    assignees:
      - simpros
